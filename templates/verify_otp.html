<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f8fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        h2 {
            margin: 0 0 10px;
        }
        p {
            margin: 0 0 16px;
            color: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            margin-top: 14px;
            padding: 12px;
            border: 0;
            border-radius: 8px;
            background: #0f766e;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .error {
            color: #b91c1c;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>OTP Verification</h2>
        <p>Enter the 6-digit code sent to your email.</p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('verify_otp') }}">
            <input type="text" name="otp" maxlength="6" pattern="\d{6}" required placeholder="Enter OTP">
            <button type="submit">Verify and Login</button>
        </form>
    </div>
</body>
</html>
